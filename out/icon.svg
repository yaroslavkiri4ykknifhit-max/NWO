<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&amp;display=swap');
      .logo-text {
        font-family: 'Caveat', 'Neucha', cursive, sans-serif;
        font-weight: 700;
        font-style: italic;
        font-size: 110px;
        fill: #2b9348; /* Premium green branding matching the dashboard */
      }
    </style>
  </defs>
  <!-- Ivory paper-cream rounded square matching the dashboard theme -->
  <rect width="180" height="180" rx="50" fill="#faf8f3" />
  <rect x="2" y="2" width="176" height="176" rx="48" stroke="#2b9348" stroke-opacity="0.15" stroke-width="4" />
  
  <!-- Centered logo text -->
  <text x="52%" y="58%" dominant-baseline="middle" text-anchor="middle" class="logo-text">NWO</text>
</svg>